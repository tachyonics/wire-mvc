name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# wire-mvc is proposal-native and swift-tools-version 6.4: it depends on the swift-http-api-proposal
# stack (via swift-http-server's NIOHTTPServer) and swift-syntax's pre-release 604 line, so it builds
# only on a Swift 6.4 toolchain — the build/format jobs run on the nightly 6.4 container, since
# SwiftyLab/setup-swift installs released toolchains only. swift-syntax 604 is pinned via its
# release/6.4.x branch in Package.swift (SPM version ranges don't resolve pre-release tags; the
# branch pin also overrides swift-wire's transitive 603 requirement).
jobs:
  BuildAndRun:
    name: Swift 6.4 nightly
    runs-on: ubuntu-24.04
    container: swiftlang/swift:nightly-6.4.x-noble
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: apt-get update && apt-get install -y libssl-dev
      - name: Build
        run: swift build
      - name: Run end-to-end example
        # @Controller generates the RouteContributor witnesses; Wire collates them; WireMVC.router
        # turns them into NIOHTTPServer's request handler and the example drives every route over
        # real HTTP on an ephemeral loopback port. Prints "wire-mvc example OK" or exits non-zero.
        run: swift run WireMVCExample

  SwiftFormat:
    name: swift-format (6.4 toolchain)
    runs-on: ubuntu-24.04
    container: swiftlang/swift:nightly-6.4.x-noble
    steps:
      - uses: actions/checkout@v6
      - name: Run swift-format
        # From the 6.4 toolchain so it parses the proposal's ~Copyable / consuming sending syntax
        # (a released swift-format can't).
        run: swift-format format --recursive --in-place .
      - name: Check for formatting differences
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git diff --exit-code

  SwiftLint:
    name: SwiftLint 0.63.2
    # `swiftlint lint` is SwiftSyntax-based and parses the 6.4 sources fine, so it needs no toolchain
    # and runs on a plain runner. (The `unused_import` *analyzer* rule is not run: it drives SourceKit
    # against the compiler build log, whose 6.4-only flags this SwiftLint's SourceKit rejects — on 6.4
    # the compiler's own InternalImportsByDefault emits unused-import warnings natively instead.)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        # The prebuilt Linux binary needs the GLIBC on ubuntu-24.04+.
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.63.2/swiftlint_linux_amd64.zip -o swiftlint.zip
          unzip -o swiftlint.zip -d /usr/local/bin
          chmod +x /usr/local/bin/swiftlint
      - name: SwiftLint
        run: swiftlint lint --quiet
